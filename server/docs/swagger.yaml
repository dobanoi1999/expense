basePath: /api
definitions:
  dto.RegisterRequest:
    properties:
      email:
        type: string
      name:
        minLength: 2
        type: string
      passowrd:
        minLength: 6
        type: string
    required:
    - email
    - name
    - passowrd
    type: object
  model.User:
    properties:
      avatarUrl:
        type: string
      createdAt:
        type: string
      currency:
        type: string
      displayName:
        type: string
      email:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      locale:
        type: string
      passwordHash:
        type: string
      updatedAt:
        type: string
    type: object
externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
host: localhost:8080
info:
  contact: {}
  description: Production-ready REST API with Clean Architecture
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Expense Tracker API
  version: "1.0"
paths:
  /auth/register:
    post:
      consumes:
      - application/json
      description: Tạo mới người dùng với email, password
      parameters:
      - description: Thông tin đăng ký
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Đăng ký tài khoản
      tags:
      - Auth
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
